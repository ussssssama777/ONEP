<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Listes — ONEP</title>
<link rel="stylesheet" href="style/css/style.css">
</head>

<body>

<header>
  <div class="logo">ONEP</div>
  <div class="header-actions">
    <button onclick="window.location.href='index.html'">← Retour</button>
  </div>
</header>

<main>
  <div class="container">

    <h1>Listes</h1>

    <!-- BOUTONS TOGGLE -->
    <div class="toggle-buttons">
      <button class="toggle-btn active" id="btn-fourniture" onclick="switchTable('fourniture')">
        Liste Fournitures
      </button>
      <button class="toggle-btn" id="btn-personnel" onclick="switchTable('personnel')">
        Liste Personnel
      </button>
      <button class="toggle-btn" id="btn-distribution" onclick="switchTable('distribution')">
        Liste Distribution
      </button>
    </div>

    <!-- TABLE FOURNITURES -->
    <section id="section-fourniture">
      <h2>Liste Fournitures</h2>
      <table>
        <thead>
          <tr>
            <th>Code</th>
            <th>Designation</th>
            <th>Unité</th>
            <th>Stock</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="fourniture-tbody">
          <tr>
            <td colspan="5" style="text-align:center;color:#94a3b8">Chargement...</td>
          </tr>
        </tbody>
      </table>
    </section>

    <!-- TABLE PERSONNEL -->
    <section id="section-personnel" style="display:none">
      <h2>Liste Personnel</h2>
      <table>
        <thead>
          <tr>
            <th>Matricule</th>
            <th>Nom</th>
            <th>Prénom</th>
            <th>Code Service</th>
            <th>Libelle</th>
          </tr>
        </thead>
        <tbody id="personel-tbody">
          <tr>
            <td colspan="5" style="text-align:center;color:#94a3b8">Chargement...</td>
          </tr>
        </tbody>
      </table>
    </section>
    <!-- TABLE DISTRIBUTION -->
    <section id="section-distribution" style="display:none">
      <h2>Liste Distribution</h2>
      <table>
        <thead>
          <tr>
            <th>Matricule</th>
            <th>Code Fourniture</th>
            <th>Designation</th>
            <th>Date</th>
            <th>Quantité</th>
            <th>Recupéré Par</th>
          </tr>
        </thead>
        <tbody id="distribution-tbody">
          <tr>
            <td colspan="6" style="text-align:center;color:#94a3b8">Chargement...</td>
          </tr>
        </tbody>
      </table>
    </section>


  </div>
</main>

<!-- MODAL Update Fourniture -->
<div id="modalUpdateFourniture" class="modal">
  <div class="modal-content">
    <h2>Modifier Fourniture</h2>
    <input type="hidden" id="update_id">
    <input type="text"   id="update_fourniture" placeholder="Fourniture">
    <input type="text"   id="update_unite"      placeholder="Unité">
    <input type="number" id="update_QTE"        placeholder="Quantité">
    <div class="modal-buttons">
      <button onclick="updateFourniture()">Modifier</button>
      <button onclick="closeModalUpdateFourniture()">Fermer</button>
    </div>
  </div>
</div>

<script src="listes.js"></script>
</body>
</html>
